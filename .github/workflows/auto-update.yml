name: 🏆 Update Office World Cup Tracker

on:
  schedule:
    - cron: '*/10 * * * *' # Runs automatically every 10 minutes during matches
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python update_tracker.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "🏆 Auto-updated live match data"
          git push
