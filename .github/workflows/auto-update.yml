name: ⚽ Auto Update World Cup Scores
on:
  schedule:
    - cron: '0 * * * *' # Wakes up automatically every hour
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Check out code
        uses: actions/checkout@v4

      - name: 🤖 Fetch Live Scores & Update Board
        env:
          API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          # Fetch data securely using your official football-data.org token
          # -k included to safeguard against any handshake/exit code 60 errors
          uses_live_data=$(curl -k -s -H "X-Auth-Token: $API_KEY" "https://api.football-data.org/v4/competitions/WC/matches")
          
          if [ -z "$uses_live_data" ] || echo "$uses_live_data" | grep -q '"error"'; then
            echo "API Error or empty response. Check your API key token in GitHub Secrets."
            exit 1
          fi

          # Let Python process football-data.org's specific structural layout
          python3 -c "
          import json, re

          raw_data = json.loads('''$uses_live_data''')
          raw_matches = raw_data.get('matches', [])

          formatted_matches = []
          for m in raw_matches:
              # Map statuses to fit your frontend CSS engine
              status = 'UPCOMING'
              if m['status'] in ['IN_PLAY', 'PAUSED']: 
                  status = 'LIVE'
              elif m['status'] == 'FINISHED': 
                  status = 'FINISHED'
              
              # Pull scores cleanly, defaulting to 0 if none exist yet
              home_score = m.get('score', {}).get('fullTime', {}).get('home', 0)
              away_score = m.get('score', {}).get('fullTime', {}).get('away', 0)
              if home_score is None: home_score = 0
              if away_score is None: away_score = 0

              time_label = 'Completed' if status == 'FINISHED' else 'Scheduled'
              if status == 'LIVE': time_label = 'Live Match'

              formatted_matches.append({
                  'home': m['homeTeam']['name'],
                  'away': m['awayTeam']['name'],
                  'homeScore': home_score,
                  'awayScore': away_score,
                  'status': status,
                  'time': time_label
              })

          # Inject clean payload into index.html
          with open('index.html', 'r') as f:
              html = f.read()

          replacement = f'// --- ROBOT LIVE DATA INSERTION POINT ---\n        const matches = {json.dumps(formatted_matches, indent=8)};\n        // --- END ROBOT LIVE DATA ---'
          pattern = r'// --- ROBOT LIVE DATA INSERTION POINT ---.*?// --- END ROBOT LIVE DATA ---'
          new_html = re.sub(pattern, replacement, html, flags=re.DOTALL)

          with open('index.html', 'w') as f:
              f.write(new_html)
          "

      - name: 🚀 Push Updates Live
        run: |
          git config --global user.name "CreateBot"
          git config --global user.email "bot@createadvertising.com"
          git add index.html
          git commit -m "⚽ Robot updated the live scores via football-data.org!" || exit 0
          git push
