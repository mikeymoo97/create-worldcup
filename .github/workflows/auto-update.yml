name: ⚽ Auto Update World Cup Scores
on:
  schedule:
    - cron: '0 * * * *' # Wakes up automatically every hour
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Check out code
        uses: actions/checkout@v4

      - name: 🤖 Fetch Live Scores & Update Board
        env:
          API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          # Fetch data securely using your verified token
          uses_live_data=$(curl -k -s -H "X-Auth-Token: $API_KEY" "https://api.football-data.org/v4/competitions/WC/matches")
          
          # Check for completely empty response
          if [ -z "$uses_live_data" ]; then
            echo "Empty API response. Skipping update."
            exit 1
          fi

          # Safe handling of bash variables inside python
          export RAW_JSON="$uses_live_data"

          python3 -c "
          import json, re, os

          raw_data = json.loads(os.environ['RAW_JSON'])
          raw_matches = raw_data.get('matches', [])

          formatted_matches = []
          for m in raw_matches:
              # Map states to fit your CSS classes
              api_status = m.get('status', 'TIMED')
              status = 'UPCOMING'
              if api_status in ['IN_PLAY', 'PAUSED', 'LIVE']: 
                  status = 'LIVE'
              elif api_status == 'FINISHED': 
                  status = 'FINISHED'
              
              # Grab clean full-time score integers safely
              full_time = m.get('score', {}).get('fullTime', {})
              home_score = full_time.get('home')
              away_score = full_time.get('away')
              
              if home_score is None: home_score = 0
              if away_score is None: away_score = 0

              # Clean text labels
              time_label = 'Completed' if status == 'FINISHED' else 'Scheduled'
              if status == 'LIVE': time_label = 'Live Match'

              # Standardize names to match your sweepstake key strings
              home_name = m['homeTeam'].get('name', '')
              away_name = m['awayTeam'].get('name', '')
              
              if home_name == 'United States': home_name = 'USA'
              if away_name == 'United States': away_name = 'USA'
              if home_name == 'South Korea': home_name = 'South Korea'
              if away_name == 'South Korea': away_name = 'South Korea'

              formatted_matches.append({
                  'home': home_name,
                  'away': away_name,
                  'homeScore': int(home_score),
                  'awayScore': int(away_score),
                  'status': status,
                  'time': time_label,
                  'utcDate': m.get('utcDate', '')
              })

          # Inject parsed results array straight into your index.html
          with open('index.html', 'r') as f:
              html = f.read()

          replacement = f'// --- ROBOT LIVE DATA INSERTION POINT ---\n        const matches = {json.dumps(formatted_matches, indent=8)};\n        // --- END ROBOT LIVE DATA ---'
          pattern = r'// --- ROBOT LIVE DATA INSERTION POINT ---.*?// --- END ROBOT LIVE DATA ---'
          
          new_html = re.sub(pattern, lambda m: replacement, html, flags=re.DOTALL)

          with open('index.html', 'w') as f:
              f.write(new_html)
          "

      - name: 🚀 Push Updates Live
        run: |
          git config --global user.name "CreateBot"
          git config --global user.email "bot@createadvertising.com"
          git add index.html
          git commit -m "⚽ Robot successfully synced tournament match dates!" || exit 0
          git push
