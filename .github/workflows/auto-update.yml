name: Update World Cup Scores

on:
  schedule:
    # Runs exactly at the start of every hour (e.g., 12:00, 1:00, 2:00)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to still trigger updates manually via the GitHub UI

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch Latest Scores
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          # This automatically locates fetch_scores.py anywhere in your repo and runs it
          SCRIPT_PATH=$(find . -name "fetch_scores.py" -print -quit)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ ERROR: Could not find fetch_scores.py anywhere in the repository!"
            exit 1
          fi
          echo "🚀 Found script at: $SCRIPT_PATH"
          python "$SCRIPT_PATH"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "🏆 Auto-update match scores and standings [Skip CI]"
          git push
