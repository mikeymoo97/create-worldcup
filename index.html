<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 COMPANY WORLD CUP TRACKER ⚽</title>
    <!-- Modern Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "⚽ ✨ 🏆 🎉 🏟️ 🌟";
            position: fixed;
            top: -10px;
            left: 0;
            width: 100%;
            font-size: 24px;
            letter-spacing: 2rem;
            text-align: center;
            opacity: 0.15;
            pointer-events: none;
            white-space: nowrap;
        }

        header {
            text-align: center;
            margin: 40px auto;
            max-width: 800px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff007f, #7928ca, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            animation: glow 3s ease-in-out infinite alternate;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 1024px) {
            .container {
                grid-template-columns: 1.3fr 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            color: #00f2fe;
            flex-shrink: 0;
        }

        .scrollable-content {
            overflow-y: auto;
            padding-right: 10px;
            flex-grow: 1;
        }

        /* Scrollbar styles */
        .scrollable-content::-webkit-scrollbar { width: 6px; }
        .scrollable-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .scrollable-content::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

        /* Leaderboard styling */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leader-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px 18px;
            border-radius: 16px;
            transition: transform 0.2s, background 0.2s;
        }

        .leader-item:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.1);
        }

        .rank-team {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-badge {
            font-weight: 800;
            width: 28px;
            height: 28px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .leader-item:nth-child(1) .rank-badge { background: #f59e0b; color: #0f172a; }
        .leader-item:nth-child(2) .rank-badge { background: #cbd5e1; color: #0f172a; }
        .leader-item:nth-child(3) .rank-badge { background: #b45309; color: #f8fafc; }

        .employee-tag {
            font-size: 0.8rem;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #0f172a;
            padding: 1px 8px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
            display: inline-block;
        }

        .points-badge {
            font-weight: 800;
            color: #10b981;
            font-size: 1.1rem;
        }

        /* Match Cards styling */
        .matches-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 18px;
            padding: 15px 20px;
            border-left: 6px solid #4facfe;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            text-align: center;
        }

        .match-card.live {
            border-left-color: #ef4444;
            animation: pulse-border 2s infinite;
        }

        .match-card.upcoming {
            border-left-color: #64748b;
        }

        .team-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .flag { font-size: 2.2rem; }
        .team-name { font-weight: 600; font-size: 1rem; }
        .owner { font-size: 0.8rem; color: #94a3b8; }

        .center-score {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }

        .score-display {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: rgba(255,255,255,0.1);
            padding: 3px 12px;
            border-radius: 10px;
            margin-bottom: 3px;
        }

        .match-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            font-weight: 600;
        }

        .match-card.live .match-status { color: #ef4444; }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255,0,127,0.3); }
            to { text-shadow: 0 0 20px rgba(0,242,254,0.5); }
        }

        @keyframes pulse-border {
            0% { border-left-color: #ef4444; }
            50% { border-left-color: rgba(239, 68, 68, 0.2); }
            100% { border-left-color: #ef4444; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 Office World Cup Tracker ⚽</h1>
        <p class="subtitle">✨ Real-time Leaderboard & Office Sweepstakes Hub ✨</p>
    </header>

    <div class="container">
        <!-- Main Matches column -->
        <div class="card">
            <h2><i class="fa-solid fa-stadium"></i> 🏟️ Fixtures & Live Scores</h2>
            <div class="scrollable-content matches-grid" id="matches-container">
                <!-- Injected dynamically by JavaScript -->
            </div>
        </div>

        <!-- Sidebar Leaderboard column -->
        <div class="card">
            <h2><i class="fa-solid fa-trophy"></i> 👑 Current Leaderboard</h2>
            <div class="scrollable-content leaderboard-list" id="leaderboard-container">
                <!-- Injected dynamically by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // 🛠️ ADMIN CONTROL PANEL (THE ONLY PLACE YOU NEED TO EDIT)
        // =========================================================
        
        // 1. Employee Assignment Database
        const teamAssignments = {
            "Mexico": { employee: "Mac Fuller", flag: "🇲🇽" },
            "South Africa": { employee: "Alastair Veale", flag: "🇿🇦" },
            "South Korea": { employee: "Anaïs Soto", flag: "🇰🇷" },
            "Czechia": { employee: "Steve Yealin", flag: "🇨🇿" },
            "Bosnia": { employee: "David Tolu Graham", flag: "🇧🇦" },
            "Qatar": { employee: "Sunil Beri", flag: "🇶🇦" },
            "Switzerland": { employee: "Becca Capel", flag: "🇨🇭" },
            "Brazil": { employee: "Karth Suthahar", flag: "🇧🇷" },
            "Morocco": { employee: "Matthew Knight", flag: "🇲🇦" },
            "Haiti": { employee: "Alex Robbins", flag: "🇭🇹" },
            "Scotland": { employee: "Andrew Wood", flag: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
            "USA": { employee: "Flora Barker", flag: "🇺🇸" },
            "Paraguay": { employee: "Claire Bossiere", flag: "🇵🇾" },
            "Australia": { employee: "Aimee Muddiman", flag: "🇦🇺" },
            "Turkey": { employee: "Anousla Watts", flag: "🇹🇷" },
            "Germany": { employee: "Gery Batson", flag: "🇩🇪" },
            "Curacao": { employee: "Mike Lowe", flag: "🇨🇼" },
            "Ivory Coast": { employee: "Daniel Sinclair", flag: "🇨🇮" },
            "Netherlands": { employee: "Shaunak Ranade", flag: "🇳🇱" },
            "Japan": { employee: "Vijay Sodhi", flag: "🇯🇵" },
            "Tunisia": { employee: "Nick Warner", flag: "🇹🇳" },
            "Belgium": { employee: "Ella Williams", flag: "🇧🇪" },
            "Egypt": { employee: "Ellie Dawes", flag: "🇪🇬" },
            "Iran": { employee: "Cara Brown", flag: "🇮🇷" },
            "New Zealand": { employee: "Joe Curry", flag: "🇳🇿" },
            "Cape Verde": { employee: "Kavi Walia", flag: "🇨🇻" },
            "Saudi Arabia": { employee: "Melekia McDonald", flag: "🇸🇦" },
            "Uruguay": { employee: "Jenny Lyne", flag: "🇺🇾" },
            "France": { employee: "Agnese D’Ubaldi", flag: "🇫🇷" },
            "Senegal": { employee: "Aaron Beria", flag: "🇸🇳" },
            "Iraq": { employee: "Daniel Lack", flag: "🇮🇶" },
            "Norway": { employee: "Mick Aerts", flag: "🇳🇴" },
            "Argentina": { employee: "Juliet Ingram", flag: "🇦🇷" },
            "Algeria": { employee: "Sam Palmer", flag: "🇩🇿" },
            "Jordan": { employee: "Autumn Moore", flag: "🇯🇴" },
            "Portugal": { employee: "Matthew Harvey", flag: "🇵🇹" },
            "Congo DR": { employee: "Hayden Shu", flag: "🇨🇩" },
            "Uzbekistan": { employee: "Kudzu Dyirakumund", flag: "🇺🇿" },
            "Colombia": { employee: "Bruno Gonta", flag: "🇨🇴" },
            "Croatia": { employee: "Kial Kirlew", flag: "🇭🇷" },
            "Ghana": { employee: "Mario Charalambous", flag: "🇬🇭" },
            "Panama": { employee: "Harriett Sydall", flag: "🇵🇦" },
            "England": { employee: "Paul Mayall", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
            "Spain": { employee: "Alex Manley", flag: "🇪🇸" },
            "Canada": { employee: "Ed Barney", flag: "🇨🇦" },
            "Sweden": { employee: "Maxine Renning", flag: "🇸🇪" }
        };

        // 2. MATCH FIXTURES ENGINE 
        // Instructions: Add/Update matches here. Set status to: 'FINISHED', 'LIVE', or 'UPCOMING'.
        // Points system updates dynamically from this data: Win = 3pts, Draw = 1pt, Loss = 0pts.
        const matches = [
            { home: "England", away: "Germany", homeScore: 2, awayScore: 1, status: "FINISHED", time: "Completed" },
            { home: "Brazil", away: "France", homeScore: 2, awayScore: 2, status: "LIVE", time: "65 mins" },
            { home: "Mexico", away: "USA", homeScore: 0, awayScore: 0, status: "UPCOMING", time: "Tonight 20:00" },
            { home: "Japan", away: "Netherlands", homeScore: 0, awayScore: 0, status: "UPCOMING", time: "Tomorrow 15:00" }
        ];

        // ==========================================
        // 🚀 DYNAMIC ENGINE (Calculates Everything)
        // ==========================================
        
        function renderApp() {
            const matchesContainer = document.getElementById('matches-container');
            const leaderboardContainer = document.getElementById('leaderboard-container');
            
            matchesContainer.innerHTML = '';
            leaderboardContainer.innerHTML = '';

            // Initialize total points calculated array
            const pointsTable = {};
            Object.keys(teamAssignments).forEach(country => {
                pointsTable[country] = 0;
            });

            // Parse match scores to dynamically award points
            matches.forEach(match => {
                if (match.status === 'FINISHED' || match.status === 'LIVE') {
                    if (match.homeScore > match.awayScore) {
                        if(pointsTable[match.home] !== undefined) pointsTable[match.home] += 3;
                    } else if (match.awayScore > match.homeScore) {
                        if(pointsTable[match.away] !== undefined) pointsTable[match.away] += 3;
                    } else {
                        if(pointsTable[match.home] !== undefined) pointsTable[match.home] += 1;
                        if(pointsTable[match.away] !== undefined) pointsTable[match.away] += 1;
                    }
                }

                // Render Match Element
                const homeInfo = teamAssignments[match.home] || { employee: "Unassigned", flag: "🏳️" };
                const awayInfo = teamAssignments[match.away] || { employee: "Unassigned", flag: "🏳️" };
                
                const matchHtml = `
                    <div class="match-card ${match.status.toLowerCase()}">
                        <div class="team-side">
                            <span class="flag">${homeInfo.flag}</span>
                            <span class="team-name">${match.home}</span>
                            <span class="owner">👤 ${homeInfo.employee}</span>
                        </div>
                        <div class="center-score">
                            <div class="score-display">${match.homeScore} - ${match.awayScore}</div>
                            <span class="match-status">${match.status === 'LIVE' ? '🔴 LIVE - ' + match.time : match.time}</span>
                        </div>
                        <div class="team-side">
                            <span class="flag">${awayInfo.flag}</span>
                            <span class="team-name">${match.away}</span>
                            <span class="owner">👤 ${awayInfo.employee}</span>
                        </div>
                    </div>
                `;
                matchesContainer.innerHTML += matchHtml;
            });

            // Sort and Render Leaderboard
            const sortedTeams = Object.keys(teamAssignments).map(key => ({
                country: key,
                points: pointsTable[key] || 0,
                ...teamAssignments[key]
            })).sort((a, b) => b.points - a.points);

            sortedTeams.forEach((team, index) => {
                const leaderHtml = `
                    <div class="leader-item">
                        <div class="rank-team">
                            <div class="rank-badge">${index + 1}</div>
                            <div>
                                <strong>${team.flag} ${team.country}</strong>
                                <span class="employee-tag">${team.employee}</span>
                            </div>
                        </div>
                        <div class="points-badge">${team.points} PTS</div>
                    </div>
                `;
                leaderboardContainer.innerHTML += leaderHtml;
            });
        }

        renderApp();
    </script>
</body>
</html>
