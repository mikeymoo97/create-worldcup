<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 CREATE ADVERTISING WORLD CUP TRACKER ⚽</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #10b981; /* Football Green */
            --secondary: #047857; 
            --pitch-bg: linear-gradient(135deg, #022c22 0%, #059669 40%, #10b981 70%, #047857 100%);
            --card-bg: #ffffff; /* Clean White Boxes */
            --text-dark: #0f172a;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--pitch-bg);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* High Density Stadium Vibes Overlay */
        body::before {
            content: "⚽ ✨ 🏟️ 🏆 ⚽ 🎉 🌟 ⚽ 🏟️ 🏆 ⚽ ✨ 🏟️ 🏆 ⚽ 🎉 🌟 ⚽ 🏟️ 🏆";
            position: fixed;
            top: -10px;
            left: 0;
            width: 100%;
            font-size: 26px;
            letter-spacing: 1.5rem;
            text-align: center;
            opacity: 0.25;
            pointer-events: none;
            white-space: nowrap;
            line-height: 2;
            text-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Second Layer of Background Elements for extra depth */
        body::after {
            content: "⚽ ✨ 🏟️ 🏆 ⚽ 🎉 🌟 ⚽ 🏟️ 🏆 ⚽ ✨ 🏟️ 🏆 ⚽ 🎉 🌟 ⚽ 🏟️ 🏆";
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            font-size: 22px;
            letter-spacing: 1.8rem;
            text-align: center;
            opacity: 0.15;
            pointer-events: none;
            white-space: nowrap;
        }

        header {
            text-align: center;
            margin: 40px auto;
            max-width: 900px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #fef08a, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        p.subtitle {
            font-size: 1.5rem;
            color: #fef08a;
            font-weight: 800;
            text-transform: lowercase;
            font-style: italic;
            text-shadow: 0 2px 6px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        /* Responsive 3-Column Layout */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 1200px) {
            .container {
                grid-template-columns: 1.2fr 1fr 0.9fr;
            }
        }

        /* Pitch White Cards */
        .card {
            background: var(--card-bg);
            border: 4px solid #fef08a; /* Enhanced Golden boundary outline */
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
            max-height: 82vh;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #f0fdf4;
            padding-bottom: 10px;
            color: #047857;
            flex-shrink: 0;
        }

        .scrollable-content {
            overflow-y: auto;
            padding-right: 8px;
            flex-grow: 1;
        }

        /* Clean Scrollbars */
        .scrollable-content::-webkit-scrollbar { width: 6px; }
        .scrollable-content::-webkit-scrollbar-track { background: #f1f5f9; }
        .scrollable-content::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        /* General List Item Layout */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 16px;
            margin-bottom: 8px;
            transition: transform 0.15s, background 0.15s;
        }

        .list-item:hover {
            transform: translateX(4px);
            background: #f1f5f9;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-badge {
            font-weight: 800;
            width: 28px;
            height: 28px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        /* Leaderboard Podium colors */
        .leaderboard-list .list-item:nth-child(1) .rank-badge { background: #fef08a; border: 1px solid #eab308; } 
        .leaderboard-list .list-item:nth-child(2) .rank-badge { background: #e2e8f0; border: 1px solid #94a3b8; } 
        .leaderboard-list .list-item:nth-child(3) .rank-badge { background: #ffedd5; border: 1px solid #ea580c; } 

        .employee-tag {
            font-size: 0.8rem;
            background: linear-gradient(45deg, #dcfce7, #bbf7d0);
            color: #166534;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
            display: inline-block;
        }

        .points-badge {
            font-weight: 800;
            color: #047857;
            font-size: 1.1rem;
        }

        /* Directory specific styling */
        .directory-name {
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .directory-country {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* Match Cards styling */
        .matches-grid {
            display: flex;
            flex-direction: column;
        }

        .match-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 6px solid #3b82f6; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            text-align: center;
        }

        .match-card.live {
            border-left-color: #ef4444;
            background: #fef2f2;
            animation: pulse-bg 2s infinite linear;
        }

        .match-card.finished { border-left-color: #10b981; }
        .match-card.upcoming { border-left-color: #64748b; }

        .team-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .flag { font-size: 2.2rem; }
        .team-name { font-weight: 600; font-size: 1rem; color: var(--text-dark); }
        .owner { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        .center-score {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }

        .score-display {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: #e2e8f0;
            padding: 3px 12px;
            border-radius: 10px;
            margin-bottom: 3px;
        }

        .match-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .match-card.live .match-status { color: #ef4444; }

        @keyframes pulse-bg {
            0% { background-color: #fef2f2; }
            50% { background-color: #fee2e2; }
            100% { background-color: #fef2f2; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 CREATE ADVERTISING WORLD CUP TRACKER ⚽</h1>
        <p class="subtitle">its coming home</p>
    </header>

    <div class="container">
