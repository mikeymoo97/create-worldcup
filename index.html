<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 CREATE ADVERTISING WORLD CUP TRACKER ⚽</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #10b981;
            --pitch-bg: radial-gradient(circle at 50% 30%, #064e3b 0%, #022c22 70%, #011510 100%);
            --card-bg: rgba(255, 255, 255, 0.96); 
            --text-dark: #0f172a;
            --text-muted: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--pitch-bg); color: var(--text-dark); min-height: 100vh; padding: 30px 20px; overflow-x: hidden; position: relative; }

        /* 🏟️ STADIUM BACKGROUND OVERLAYS */
        body::before {
            content: "✨ 🏟️ 🏆 ⚽ ⚡ 🔥 ✨ 🏟️ 🏆 ⚽ ⚡ 🔥 ✨ 🏟️ 🏆 ⚽ ⚡ 🔥 ✨ 🏟️ 🏆";
            position: fixed; top: -10px; left: -5%; width: 110%; font-size: 32px; letter-spacing: 2rem;
            text-align: center; opacity: 0.25; pointer-events: none; white-space: nowrap; line-height: 2;
            animation: broadcast-drift 20s linear infinite; text-shadow: 0 0 12px rgba(254, 240, 138, 0.6);
        }
        .stadium-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(16, 185, 129, 0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(16, 185, 129, 0.05) 2px, transparent 2px); background-size: 50px 50px; pointer-events: none; z-index: 1; }
        @keyframes broadcast-drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-20px); } }

        header { text-align: center; margin-bottom: 40px; position: relative; z-index: 10; }
        .header-top { font-size: 1.4rem; font-weight: 900; color: #fef08a; text-transform: uppercase; letter-spacing: 8px; text-shadow: 0 0 15px rgba(234, 179, 8, 0.7); }
        h1 { font-size: 5.2rem; font-weight: 900; background: linear-gradient(180deg, #ffffff 20%, #fef08a 60%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 6px 15px rgba(0, 0, 0, 0.8)); }
        p.subtitle { font-size: 1.8rem; color: #ffffff; font-weight: 800; font-style: italic; background: rgba(0, 0, 0, 0.6); display: inline-block; padding: 8px 35px; border-radius: 50px; border: 2px dashed #10b981; margin-top: 10px; text-shadow: 0 0 10px rgba(16, 185, 129, 0.9); }

        /* Main Structured Grid Panels */
        .dashboard { max-width: 1800px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; position: relative; z-index: 10; }
        .top-row { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 1024px) { .top-row { grid-template-columns: 1.2fr 1.2fr 1fr; } }

        .card { background: var(--card-bg); border: 4px solid #fef08a; border-radius: 24px; padding: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .panels-height { max-height: 50vh; }
        h2 { font-size: 1.4rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 3px solid #e2e8f0; padding-bottom: 10px; color: #047857; text-transform: uppercase; font-weight: 800; }
        .scrollable-content { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .scrollable-content::-webkit-scrollbar { width: 6px; }
        .scrollable-content::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        /* List Items */
        .list-item { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px 15px; border-radius: 16px; margin-bottom: 8px; }
        .directory-name { font-weight: 600; }
        .directory-country { font-size: 0.85rem; color: var(--text-muted); background: #e2e8f0; padding: 2px 8px; border-radius: 6px; font-weight: 500; }

        /* Match Cards */
        .match-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 18px; padding: 12px; margin-bottom: 10px; border-left: 6px solid #3b82f6; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; text-align: center; }
        .match-card.live { border-left-color: #ef4444; background: #fef2f2; animation: pulse-bg 2s infinite linear; }
        .match-card.finished { border-left-color: #10b981; background: #f0fdf4; }
        .team-side { display: flex; flex-direction: column; align-items: center; }
        .flag { font-size: 1.8rem; }
        .team-name { font-weight: 700; font-size: 0.9rem; }
        .owner { font-size: 0.75rem; color: var(--text-muted); }
        .score-display { font-size: 1.3rem; font-weight: 800; background: #e2e8f0; padding: 2px 8px; border-radius: 8px; }
        .match-card.live .score-display { background: #ef4444; color: white; }
        .match-status { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); }
        .match-date-badge { font-size: 0.7rem; color: #1e293b; background: rgba(226, 232, 240, 0.6); padding: 1px 5px; border-radius: 4px; margin-top: 3px; display: inline-block; }

        /* =========================================================
           🎮 SMASH BROS STYLE TOURNAMENT TREE BRACKET
           ========================================================= */
        .bracket-container { display: flex; justify-content: space-between; align-items: center; gap: 15px; padding: 20px 10px; overflow-x: auto; position: relative; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; min-height: 450px; flex-shrink: 0; width: 220px; }
        
        .bracket-header { font-size: 0.85rem; font-weight: 900; text-align: center; background: #0f172a; color: #fff; padding: 5px; border-radius: 8px; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        
        .tree-match { background: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 12px; padding: 8px; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .tree-match.live-border { border-color: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.3); }
        
        .tree-team { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; border-radius: 6px; background: white; font-size: 0.85rem; font-weight: 700; border: 1px solid #e2e8f0; }
        .tree-team.winner { background: linear-gradient(90deg, #dcfce7, #bbf7d0); color: #15803d; border-color: #86efac; }
        .tree-team.loser { background: #f8fafc; color: #94a3b8; border-color: #e2e8f0; filter: grayscale(1); position: relative; }
        .tree-team.loser::after { content: "KNOCKED OUT"; position: absolute; right: 45px; font-size: 0.6rem; background: #ef4444; color: white; padding: 1px 4px; border-radius: 3px; font-weight: 800; transform: scale(0.9); }
        
        .tree-score { font-weight: 900; background: #e2e8f0; padding: 1px 6px; border-radius: 4px; font-size: 0.8rem; }
        .tree-team.winner .tree-score { background: #22c55e; color: white; }
        .tree-owner { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }

        /* Grand Champion Banner Box */
        .champion-box { background: linear-gradient(135deg, #fef08a 0%, #eab308 100%); border: 3px solid #ca8a04; text-align: center; border-radius: 16px; padding: 15px; animation: pulse-bg 2s infinite linear; }
        .champion-title { font-size: 0.85rem; font-weight: 900; color: #854d0e; text-transform: uppercase; letter-spacing: 1px; }
        .champion-display { font-size: 1.4rem; font-weight: 900; color: #0f172a; margin-top: 5px; }

        @keyframes pulse-bg { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body>

    <div class="stadium-grid"></div>

    <header>
        <div class="header-top">⚡ CREATE ADVERTISING LIVE ⚡</div>
        <h1>WORLD CUP TRACKER</h1>
        <p class="subtitle">its coming home 🏴󠁧󠁢󠁥󠁮󠁧󠁿</p>
    </header>

    <div class="dashboard">
        <div class="top-row">
            <div class="card panels-height">
                <h2>🔴 Active & Upcoming</h2>
                <div class="scrollable-content" id="active-matches-container"></div>
            </div>

            <div class="card panels-height">
                <h2>✅ Past Results</h2>
                <div class="scrollable-content" id="past-matches-container"></div>
            </div>

            <div class="card panels-height">
                <h2>📋 Office Directory</h2>
                <div class="scrollable-content" id="directory-container"></div>
            </div>
        </div>

        <div class="card">
            <h2>🎮 Tournament Tree Brackets (Knockout Phase)</h2>
            <div class="bracket-container">
                
                <div class="bracket-column">
                    <div class="bracket-header">Round of 16</div>
                    <div id="r16-box" style="display:flex; flex-direction:column; gap:20px; justify-content:space-around; height:100%;">
                        </div>
                </div>

                <div class="bracket-column">
                    <div class="bracket-header">Quarter Finals</div>
                    <div id="qf-box" style="display:flex; flex-direction:column; gap:50px; justify-content:space-around; height:100%;"></div>
                </div>

                <div class="bracket-column">
                    <div class="bracket-header">Semi Finals</div>
                    <div id="sf-box" style="display:flex; flex-direction:column; gap:120px; justify-content:space-around; height:100%;"></div>
                </div>

                <div class="bracket-column">
                    <div class="bracket-header">World Cup Final</div>
                    <div id="f-box" style="display:flex; flex-direction:column; justify-content:center; height:100%;"></div>
                </div>

                <div class="bracket-column" style="justify-content: center;">
                    <div class="champion-box">
                        <div class="champion-title"><i class="fa-solid fa-crown"></i> World Champion</div>
                        <div class="champion-display" id="champion-name-target">🏆 TBD</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const teamAssignments = {
            "Mexico": { employee: "Mac Fuller", flag: "🇲🇽" },
            "South Africa": { employee: "Alastair Veale", flag: "🇿🇦" },
            "South Korea": { employee: "Anaïs Soto", flag: "🇰🇷" },
            "Czechia": { employee: "Steve Yealin", flag: "🇨🇿" },
            "Bosnia-Herzegovina": { employee: "David Tolu Graham", flag: "🇧🇦" },
            "Qatar": { employee: "Sunil Beri", flag: "🇶🇦" },
            "Switzerland": { employee: "Becca Capel", flag: "🇨🇭" },
            "Brazil": { employee: "Karth Suthahar", flag: "🇧🇷" },
            "Morocco": { employee: "Matthew Knight", flag: "🇲🇦" },
            "Haiti": { employee: "Alex Robbins", flag: "🇭🇹" },
            "Scotland": { employee: "Andrew Wood", flag: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
            "USA": { employee: "Flora Barker", flag: "🇺🇸" },
            "Paraguay": { employee: "Claire Bossiere", flag: "🇵🇾" },
            "Australia": { employee: "Aimee Muddiman", flag: "🇦🇺" },
            "Turkey": { employee: "Anousla Watts", flag: "🇹🇷" },
            "Germany": { employee: "Gery Batson", flag: "🇩🇪" },
            "Curaçao": { employee: "Mike Lowe", flag: "🇨🇼" },
            "Ivory Coast": { employee: "Daniel Sinclair", flag: "🇨🇮" },
            "Netherlands": { employee: "Shaunak Ranade", flag: "🇳🇱" },
            "Japan": { employee: "Vijay Sodhi", flag: "🇯🇵" },
            "Tunisia": { employee: "Nick Warner", flag: "🇹🇳" },
            "Belgium": { employee: "Ella Williams", flag: "🇧🇪" },
            "Egypt": { employee: "Ellie Dawes", flag: "🇪🇬" },
            "Iran": { employee: "Cara Brown", flag: "🇮🇷" },
            "New Zealand": { employee: "Joe Curry", flag: "🇳🇿" },
            "Cape Verde": { employee: "Kavi Walia", flag: "🇨🇻" },
            "Saudi Arabia": { employee: "Melekia McDonald", flag: "🇸🇦" },
            "Uruguay": { employee: "Jenny Lyne", flag: "🇺🇾" },
            "France": { employee: "Agnese D’Ubaldi", flag: "🇫🇷" },
            "Senegal": { employee: "Aaron Beedie", flag: "🇸🇳" },
            "Iraq": { employee: "Daniel Lack", flag: "🇮🇶" },
            "Norway": { employee: "Mick Aerts", flag: "🇳🇴" },
            "Argentina": { employee: "Juliet Ingram", flag: "🇦🇷" },
            "Algeria": { employee: "Sam Palmer", flag: "🇩🇿" },
            "Jordan": { employee: "Autumn Moore", flag: "🇯🇴" },
            "Portugal": { employee: "Matthew Harvey", flag: "🇵🇹" },
            "Congo DR": { employee: "Hayden Shu", flag: "🇨🇩" },
            "Uzbekistan": { employee: "Kudzu Dyirakumund", flag: "🇺🇿" },
            "Colombia": { employee: "Bruno Gonta", flag: "🇨🇴" },
            "Croatia": { employee: "Kial Kirlew", flag: "🇭🇷" },
            "Ghana": { employee: "Mario Charalambous", flag: "🇬🇭" },
            "Panama": { employee: "Harriett Sydall", flag: "🇵🇦" },
            "England": { employee: "Paul Mayall", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
            "Spain": { employee: "Alex Manley", flag: "🇪🇸" },
            "Canada": { employee: "Ed Barney", flag: "🇨🇦" },
            "Sweden": { employee: "Maxine Renning", flag: "🇸🇪" }
        };

        // 2. AUTOMATIC MATCH ENGINE DATALINK
        // --- ROBOT LIVE DATA INSERTION POINT ---
        const matches = [
            { id: 101, stage: "GROUP_STAGE", home: "England", away: "Germany", homeScore: 2, awayScore: 1, status: "FINISHED", time: "Completed", utcDate: "2026-06-15T18:00:00Z" },
            { id: 102, stage: "LAST_16", home: "Brazil", away: "France", homeScore: 3, awayScore: 1, status: "FINISHED", time: "Completed", utcDate: "2026-06-25T15:00:00Z" },
            { id: 103, stage: "LAST_16", home: "Mexico", away: "USA", homeScore: 1, awayScore: 2, status: "FINISHED", time: "Completed", utcDate: "2026-06-25T19:00:00Z" },
            { id: 104, stage: "QUARTER_FINALS", home: "Brazil", away: "USA", homeScore: 0, awayScore: 0, status: "UPCOMING", time: "Scheduled", utcDate: "2026-06-29T18:00:00Z" }
        ];
        // --- END ROBOT LIVE DATA ---

        function makeTeamRow(teamName, score, isWinner, isLoser) {
            const info = teamAssignments[teamName] || { employee: "TBD", flag: "🏳️" };
            let rowClass = "tree-team";
            if (isWinner) rowClass += " winner";
            if (isLoser) rowClass += " loser";

            return `
                <div class="${rowClass}">
                    <div style="display:flex; flex-direction:column; overflow:hidden;">
                        <span>${info.flag} ${teamName || 'TBD'}</span>
                        <span class="tree-owner">${info.employee}</span>
                    </div>
                    <span class="tree-score">${score}</span>
                </div>
            `;
        }

        function renderBracketSection(containerId, matchArray) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';

            matchArray.forEach(m => {
                const homeFinishedWin = m.status === 'FINISHED' && m.homeScore > m.awayScore;
                const awayFinishedWin = m.status === 'FINISHED' && m.awayScore > m.homeScore;
                const homeFinishedLoss = m.status === 'FINISHED' && m.awayScore > m.homeScore;
                const awayFinishedLoss = m.status === 'FINISHED' && m.homeScore > m.awayScore;

                const cardClass = m.status === 'LIVE' ? 'tree-match live-border' : 'tree-match';

                container.innerHTML += `
                    <div class="${cardClass}">
                        ${makeTeamRow(m.home, m.homeScore, homeFinishedWin, homeFinishedLoss)}
                        ${makeTeamRow(m.away, m.awayScore, awayFinishedWin, awayFinishedLoss)}
                    </div>
                `;
            });

            // Fill slots with blanks if tournament is just rolling out
            if(matchArray.length === 0) {
                container.innerHTML = `<div class="tree-match" style="opacity:0.4;"><div>🏳️ TBD</div><div style="margin-top:5px;">🏳️ TBD</div></div>`;
            }
        }

        function renderApp() {
            const activeContainer = document.getElementById('active-matches-container');
            const pastContainer = document.getElementById('past-matches-container');
            const directoryContainer = document.getElementById('directory-container');
            
            activeContainer.innerHTML = '';
            pastContainer.innerHTML = '';
            directoryContainer.innerHTML = '';

            // 1. Render Top Columns (Active Feed vs Past Feed)
            matches.forEach(match => {
                const homeInfo = teamAssignments[match.home] || { employee: "TBD", flag: "🏳️" };
                const awayInfo = teamAssignments[match.away] || { employee: "TBD", flag: "🏳️" };
                
                let formattedDate = "";
                if (match.utcDate) {
                    const d = new Date(match.utcDate);
                    formattedDate = d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                }
                
                const matchHtml = `
                    <div class="match-card ${match.status.toLowerCase()}">
                        <div class="team-side">
                            <span class="flag">${homeInfo.flag}</span>
                            <span class="team-name">${match.home || 'TBD'}</span>
                            <span class="owner">👤 ${homeInfo.employee}</span>
                        </div>
                        <div class="center-score">
                            <div class="score-display">${match.homeScore} - ${match.awayScore}</div>
                            <span class="match-status">${match.status === 'LIVE' ? '🔴 LIVE' : match.time}</span>
                            ${formattedDate ? `<span class="match-date-badge">${formattedDate}</span>` : ''}
                        </div>
                        <div class="team-side">
                            <span class="flag">${awayInfo.flag}</span>
                            <span class="team-name">${match.away || 'TBD'}</span>
                            <span class="owner">👤 ${awayInfo.employee}</span>
                        </div>
                    </div>
                `;
                
                if (match.status === 'FINISHED') {
                    pastContainer.innerHTML += matchHtml;
                } else {
                    activeContainer.innerHTML += matchHtml;
                }
            });

            if (activeContainer.innerHTML === '') activeContainer.innerHTML = '<p style="text-align:center;color:gray;padding-top:15px;">No active matches.</p>';
            if (pastContainer.innerHTML === '') pastContainer.innerHTML = '<p style="text-align:center;color:gray;padding-top:15px;">No completed history.</p>';

            // 2. Render Office Directory Column
            const sortedTeams = Object.keys(teamAssignments).map(k => ({ country: k, ...teamAssignments[k] })).sort((a,b) => a.employee.localeCompare(b.employee));
            sortedTeams.forEach(t => {
                directoryContainer.innerHTML += `
                    <div class="list-item">
                        <div class="directory-name">👤 ${t.employee}</div>
                        <span class="directory-country">${t.flag} ${t.country}</span>
                    </div>
                `;
            });

            // 3. Separate Tournament Tree Stage Brackets 
            const r16 = matches.filter(m => m.stage === 'LAST_16' || m.stage === 'ROUND_OF_16');
            const qf = matches.filter(m => m.stage === 'QUARTER_FINALS');
            const sf = matches.filter(m => m.stage === 'SEMI_FINALS');
            const finalMatch = matches.find(m => m.stage === 'FINAL');

            renderBracketSection('r16-box', r16);
            renderBracketSection('qf-box', qf);
            renderBracketSection('sf-box', sf);
            renderBracketSection('f-box', finalMatch ? [finalMatch] : []);

            // Check if Grand Champion is crowned
            if (finalMatch && finalMatch.status === 'FINISHED') {
                const champ = finalMatch.homeScore > finalMatch.awayScore ? finalMatch.home : finalMatch.away;
                const champInfo = teamAssignments[champ] || { employee: "Someone!", flag: "🏆" };
                document.getElementById('champion-name-target').innerHTML = `${champInfo.flag} ${champ} (${champInfo.employee})`;
            }
        }

        renderApp();
    </script>
</body>
</html>
