<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 CREATE ADVERTISING WORLD CUP TRACKER ⚽</title>
    <!-- Modern Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #10b981; /* Football Green */
            --secondary: #059669; 
            --pitch-bg: linear-gradient(135deg, #115e59 0%, #047857 50%, #065f46 100%);
            --card-bg: #ffffff; /* Clean White Boxes */
            --text-dark: #0f172a;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--pitch-bg);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "⚽ ✨ 🏆 🎉 🏟️ 🌟";
            position: fixed;
            top: -10px;
            left: 0;
            width: 100%;
            font-size: 24px;
            letter-spacing: 2rem;
            text-align: center;
            opacity: 0.2;
            pointer-events: none;
            white-space: nowrap;
        }

        header {
            text-align: center;
            margin: 40px auto;
            max-width: 900px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #fef08a, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        p.subtitle {
            font-size: 1.4rem;
            color: #fef08a;
            font-weight: 800;
            text-transform: lowercase;
            font-style: italic;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Responsive 3-Column Layout */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 1200px) {
            .container {
                grid-template-columns: 1.2fr 1fr 0.9fr;
            }
        }

        /* Pitch White Cards */
        .card {
            background: var(--card-bg);
            border: 3px solid #fef08a;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            max-height: 82vh;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #f0fdf4;
            padding-bottom: 10px;
            color: var(--secondary);
            flex-shrink: 0;
        }

        .scrollable-content {
            overflow-y: auto;
            padding-right: 8px;
            flex-grow: 1;
        }

        /* Clean Scrollbars */
        .scrollable-content::-webkit-scrollbar { width: 6px; }
        .scrollable-content::-webkit-scrollbar-track { background: #f1f5f9; }
        .scrollable-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* General List Item Layout */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 16px;
            margin-bottom: 8px;
            transition: transform 0.15s, background 0.15s;
        }

        .list-item:hover {
            transform: translateX(4px);
            background: #f1f5f9;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-badge {
            font-weight: 800;
            width: 28px;
            height: 28px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        /* Leaderboard Podium colors */
        .leaderboard-list .list-item:nth-child(1) .rank-badge { background: #fef08a; border: 1px solid #eab308; } 
        .leaderboard-list .list-item:nth-child(2) .rank-badge { background: #e2e8f0; border: 1px solid #94a3b8; } 
        .leaderboard-list .list-item:nth-child(3) .rank-badge { background: #ffedd5; border: 1px solid #ea580c; } 

        .employee-tag {
            font-size: 0.8rem;
            background: linear-gradient(45deg, #dcfce7, #bbf7d0);
            color: #166534;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
            display: inline-block;
        }

        .points-badge {
            font-weight: 800;
            color: var(--secondary);
            font-size: 1.1rem;
        }

        /* Directory specific styling */
        .directory-name {
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .directory-country {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* Match Cards styling */
        .matches-grid {
            display: flex;
            flex-direction: column;
        }

        .match-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 6px solid #3b82f6; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            text-align: center;
        }

        .match-card.live {
            border-left-color: #ef4444;
            background: #fef2f2;
            animation: pulse-bg 2s infinite linear;
        }

        .match-card.finished { border-left-color: #10b981; }
        .match-card.upcoming { border-left-color: #64748b; }

        .team-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .flag { font-size: 2.2rem; }
        .team-name { font-weight: 600; font-size: 1rem; color: var(--text-dark); }
        .owner { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        .center-score {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }

        .score-display {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: #e2e8f0;
            padding: 3px 12px;
            border-radius: 10px;
            margin-bottom: 3px;
        }

        .match-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .match-card.live .match-status { color: #ef4444; }

        @keyframes pulse-bg {
            0% { background-color: #fef2f2; }
            50% { background-color: #fee2e2; }
            100% { background-color: #fef2f2; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 CREATE ADVERTISING WORLD CUP TRACKER ⚽</h1>
        <p class="subtitle">its coming home</p>
    </header>

    <div class="container">
        <!-- 1st Column: Fixtures -->
        <div class="card">
            <h2><i class="fa-solid fa-stadium"></i> 🏟️ Fixtures & Live Scores</h2>
            <div class="scrollable-content matches-grid" id="matches-container">
                <!-- Injected via JavaScript -->
            </div>
        </div>

        <!-- 2nd Column: Leaderboard -->
        <div class="card">
            <h2><i class="fa-solid fa-trophy"></i> 👑 Current Leaderboard</h2>
            <div class="scrollable-content leaderboard-list" id="leaderboard-container">
                <!-- Injected via JavaScript -->
            </div>
        </div>

        <!-- 3rd Column: Employee Directory -->
        <div class="card">
            <h2><i class="fa-solid fa-users"></i> 📋 Office Directory</h2>
            <div class="scrollable-content" id="directory-container">
                <!-- Injected via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // 🛠️ ADMIN CONTROL PANEL
        // =========================================================
        
        const teamAssignments = {
            "Mexico": { employee: "Mac Fuller", flag: "🇲🇽" },
            "South Africa": { employee: "Alastair Veale", flag: "🇿🇦" },
            "South Korea": { employee: "Anaïs Soto", flag: "🇰🇷" },
            "Czechia": { employee: "Steve Yealin", flag: "🇨🇿" },
            "Bosnia": { employee: "David Tolu Graham", flag: "🇧🇦" },
            "Qatar": { employee: "Sunil Beri", flag: "🇶🇦" },
            "Switzerland": { employee: "Becca Capel", flag: "🇨🇭" },
            "Brazil": { employee: "Karth Suthahar", flag: "🇧🇷" },
            "Morocco": { employee: "Matthew Knight", flag: "🇲🇦" },
            "Haiti": { employee: "Alex Robbins", flag: "🇭🇹" },
            "Scotland": { employee: "Andrew Wood", flag: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
            "USA": { employee: "Flora Barker", flag: "🇺🇸" },
            "Paraguay": { employee: "Claire Bossiere", flag: "🇵🇾" },
            "Australia": { employee: "Aimee Muddiman", flag: "🇦🇺" },
            "Turkey": { employee: "Anousla Watts", flag: "🇹🇷" },
            "Germany": { employee: "Gery Batson", flag: "🇩🇪" },
            "Curacao": { employee: "Mike Lowe", flag: "🇨🇼" },
            "Ivory Coast": { employee: "Daniel Sinclair", flag: "🇨🇮" },
            "Netherlands": { employee: "Shaunak Ranade", flag: "🇳🇱" },
            "Japan": { employee: "Vijay Sodhi", flag: "🇯🇵" },
            "Tunisia": { employee: "Nick Warner", flag: "🇹🇳" },
            "Belgium": { employee: "Ella Williams", flag: "🇧🇪" },
            "Egypt": { employee: "Ellie Dawes", flag: "🇪🇬" },
            "Iran": { employee: "Cara Brown", flag: "🇮🇷" },
            "New Zealand": { employee: "Joe Curry", flag: "🇳🇿" },
            "Cape Verde": { employee: "Kavi Walia", flag: "🇨🇻" },
            "Saudi Arabia": { employee: "Melekia McDonald", flag: "🇸🇦" },
            "Uruguay": { employee: "Jenny Lyne", flag: "🇺🇾" },
            "France": { employee: "Agnese D’Ubaldi", flag: "🇫🇷" },
            "Senegal": { employee: "Aaron Beria", flag: "🇸🇳" },
            "Iraq": { employee: "Daniel Lack", flag: "🇮🇶" },
            "Norway": { employee: "Mick Aerts", flag: "🇳🇴" },
            "Argentina": { employee: "Juliet Ingram", flag: "🇦🇷" },
            "Algeria": { employee: "Sam Palmer", flag: "🇩🇿" },
            "Jordan": { employee: "Autumn Moore", flag: "🇯🇴" },
            "Portugal": { employee: "Matthew Harvey", flag: "🇵🇹" },
            "Congo DR": { employee: "Hayden Shu", flag: "🇨🇩" },
            "Uzbekistan": { employee: "Kudzu Dyirakumund", flag: "🇺🇿" },
            "Colombia": { employee: "Bruno Gonta", flag: "🇨🇴" },
            "Croatia": { employee: "Kial Kirlew", flag: "🇭🇷" },
            "Ghana": { employee: "Mario Charalambous", flag: "🇬🇭" },
            "Panama": { employee: "Harriett Sydall", flag: "🇵🇦" },
            "England": { employee: "Paul Mayall", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
            "Spain": { employee: "Alex Manley", flag: "🇪🇸" },
            "Canada": { employee: "Ed Barney", flag: "🇨🇦" },
            "Sweden": { employee: "Maxine Renning", flag: "🇸🇪" }
        };

        const matches = [
            { home: "England", away: "Germany", homeScore: 2, awayScore: 1, status: "FINISHED", time: "Completed" },
            { home: "Brazil", away: "France", homeScore: 2, awayScore: 2, status: "LIVE", time: "65 mins" },
            { home: "Mexico", away: "USA", homeScore: 0, awayScore: 0, status: "UPCOMING", time: "Tonight 20:00" },
            { home: "Japan", away: "Netherlands", homeScore: 0, awayScore: 0, status: "UPCOMING", time: "Tomorrow 15:00" }
        ];

        // ==========================================
        // 🚀 ENGINE
        // ==========================================
        
        function renderApp() {
            const matchesContainer = document.getElementById('matches-container');
            const leaderboardContainer = document.getElementById('leaderboard-container');
            const directoryContainer = document.getElementById('directory-container');
            
            matchesContainer.innerHTML = '';
            leaderboardContainer.innerHTML = '';
            directoryContainer.innerHTML = '';

            const pointsTable = {};
            Object.keys(teamAssignments).forEach(country => {
                pointsTable[country] = 0;
            });

            matches.forEach(match => {
                if (match.status === 'FINISHED' || match.status === 'LIVE') {
                    if (match.homeScore > match.awayScore) {
                        if(pointsTable[match.home] !== undefined) pointsTable[match.home] += 3;
                    } else if (match.awayScore > match.homeScore) {
                        if(pointsTable[match.away] !== undefined) pointsTable[match.away] += 3;
                    } else {
                        if(pointsTable[match.home] !== undefined) pointsTable[match.home] += 1;
                        if(pointsTable[match.away] !== undefined) pointsTable[match.away] += 1;
                    }
                }

                const homeInfo = teamAssignments[match.home] || { employee: "Unassigned", flag: "🏳️" };
                const awayInfo = teamAssignments[match.away] || { employee: "Unassigned", flag: "🏳️" };
                
                const matchHtml = `
                    <div class="match-card ${match.status.toLowerCase()}">
                        <div class="team-side">
                            <span class="flag">${homeInfo.flag}</span>
                            <span class="team-name">${match.home}</span>
                            <span class="owner">👤 ${homeInfo.employee}</span>
                        </div>
                        <div class="center-score">
                            <div class="score-display">${match.homeScore} - ${match.awayScore}</div>
                            <span class="match-status">${match.status === 'LIVE' ? '🔴 LIVE - ' + match.time : match.time}</span>
                        </div>
                        <div class="team-side">
                            <span class="flag">${awayInfo.flag}</span>
                            <span class="team-name">${match.away}</span>
                            <span class="owner">👤 ${awayInfo.employee}</span>
                        </div>
                    </div>
                `;
                matchesContainer.innerHTML += matchHtml;
            });

            // Map and Sort Leaderboard
            const allTeams = Object.keys(teamAssignments).map(key => ({
                country: key,
                points: pointsTable[key] || 0,
                ...teamAssignments[key]
            }));

            // Render Leaderboard (Sorted by Points)
            const sortedLeaderboard = [...allTeams].sort((a, b) => b.points - a.points);
            sortedLeaderboard.forEach((team, index) => {
                const leaderHtml = `
                    <div class="list-item">
                        <div class="rank-team">
                            <div class="rank-badge">${index + 1}</div>
                            <div>
                                <strong>${team.flag} ${team.country}</strong>
                                <span class="employee-tag">${team.employee}</span>
                            </div>
                        </div>
                        <div class="points-badge">${team.points} PTS</div>
                    </div>
                `;
                leaderboardContainer.innerHTML += leaderHtml;
            });

            // Render Office Directory (Sorted Alphabetically by Employee Name)
            const sortedDirectory = [...allTeams].sort((a, b) => a.employee.localeCompare(b.employee));
            sortedDirectory.forEach(team => {
                const directoryHtml = `
                    <div class="list-item">
                        <div class="item-meta">
                            <span>👤</span>
                            <span class="directory-name">${team.employee}</span>
                        </div>
                        <span class="directory-country">${team.flag} ${team.country}</span>
                    </div>
                `;
                directoryContainer.innerHTML += directoryHtml;
            });
        }

        renderApp();
    </script>
</body>
</html>
