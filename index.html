        }

            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 10px 0;

        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .header-top { font-size: 0.9rem; letter-spacing: 4px; }
        }

            grid-template-columns: 1fr;
            gap: 25px;
            position: relative;
            z-index: 10;

            margin-bottom: 12px;
            border-left: 6px solid #3b82f6;

            align-items: center;
            text-align: center;
        }

        .match-card.live {
            border-left-color: #ef4444;
            background: #fef2f2;
            animation: pulse-bg 2s infinite linear;

        // ==========================================
        // 🚀 ENGINE
        // ==========================================
        
        function renderApp() {
            const matchesContainer = document.getElementById('matches-container');
            const leaderboardContainer = document.getElementById('leaderboard-container');
            const directoryContainer = document.getElementById('directory-container');
            
            if(!matchesContainer || !leaderboardContainer || !directoryContainer) return;
            
            matchesContainer.innerHTML = '';
            leaderboardContainer.innerHTML = '';
            directoryContainer.innerHTML = '';

            const pointsTable = {};
            Object.keys(teamAssignments).forEach(country => {
                pointsTable[country] = 0;
            });

            matches.forEach(match => {
                if (match.status === 'FINISHED' || match.status === 'LIVE') {
                    if (match.homeScore > match.awayScore) {
                        if(pointsTable[match.home] !== undefined) pointsTable[match.home] += 3;
                    } else if (match.awayScore > match.homeScore) {
                        if(pointsTable[match.away] !== undefined) pointsTable[match.away] += 3;
                    } else {
                        if(pointsTable[match.home] !== undefined) pointsTable[match.home] += 1;
                        if(pointsTable[match.away] !== undefined) pointsTable[match.away] += 1;
                    }
                }

                const homeInfo = teamAssignments[match.home] || { employee: "Unassigned", flag: "🏳️" };
                const awayInfo = teamAssignments[match.away] || { employee: "Unassigned", flag: "🏳️" };
                
                const matchHtml = `
                    <div class="match-card ${match.status.toLowerCase()}">
                        <div class="team-side">
                            <span class="flag">${homeInfo.flag}</span>
                            <span class="team-name">${match.home}</span>
                            <span class="owner">👤 ${homeInfo.employee}</span>
                        </div>
                        <div class="center-score">
                            <div class="score-display">${match.homeScore} - ${match.awayScore}</div>
                            <span class="match-status">${match.status === 'LIVE' ? '🔴 LIVE - ' + match.time : match.time}</span>
                        </div>
                        <div class="team-side">
                            <span class="flag">${awayInfo.flag}</span>
                            <span class="team-name">${match.away}</span>
                            <span class="owner">👤 ${awayInfo.employee}</span>
                        </div>
                    </div>
                `;
                matchesContainer.innerHTML += matchHtml;
            });

            const allTeams = Object.keys(teamAssignments).map(key => ({
                country: key,
                points: pointsTable[key] || 0,
                ...teamAssignments[key]
            }));

            const sortedLeaderboard = [...allTeams].sort((a, b) => b.points - a.points);
            sortedLeaderboard.forEach((team, index) => {
                const leaderHtml = `
                    <div class="list-item">
                        <div class="rank-team">
                            <div class="rank-badge">${index + 1}</div>
                            <div>
                                <strong>${team.flag} ${team.country}</strong>
                                <span class="employee-tag">${team.employee}</span>
                            </div>
                        </div>
                        <div class="points-badge">${team.points} PTS</div>
                    </div>
                `;
                leaderboardContainer.innerHTML += leaderHtml;
            });

            const sortedDirectory = [...allTeams].sort((a, b) => a.employee.localeCompare(b.employee));
            sortedDirectory.forEach(team => {
                const directoryHtml = `
                    <div class="list-item">
                        <div class="item-meta">
                            <span>👤</span>
                            <span class="directory-name">${team.employee}</span>
                        </div>
                        <span class="directory-country">${team.flag} ${team.country}</span>
                    </div>
                `;
                directoryContainer.innerHTML += directoryHtml;
            });
        }

        renderApp();
    </script>
