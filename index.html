<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --live-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.8s ease;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .match-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .match-card.live {
            border-color: rgba(239, 68, 68, 0.4);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(239, 68, 68, 0.05) 100%);
        }

        .team-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 35%;
            text-align: center;
        }

        .flag {
            font-size: 2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .team-name {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            margin-bottom: 2px;
        }

        .owner {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .center-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 30%;
        }

        .score-display {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .match-status {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
        }

        .live .match-status {
            color: var(--live-color);
            background: rgba(239, 68, 68, 0.1);
            animation: pulse 2s infinite;
        }

        .match-date-badge {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(12px);
        }

        .directory-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .directory-list::-webkit-scrollbar {
            width: 4px;
        }

        .directory-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .directory-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .directory-country {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- SMASH BROS TOURNAMENT BRACKET CSS --- */
        .bracket-wrapper {
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .bracket-container {
            display: flex;
            gap: 20px;
            min-width: 1000px;
            padding: 10px 5px;
        }

        .bracket-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 14px;
        }

        .bracket-column-title {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-color);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .tree-match {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .tree-match.live-border {
            border-color: var(--live-color);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .tree-team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            min-height: 34px;
        }

        .tree-team.winner {
            background: linear-gradient(to right, rgba(34, 197, 94, 0.15), rgba(255,255,255,0.02));
            color: #4ade80;
        }

        .tree-team.loser {
            opacity: 0.4;
        }

        .tree-owner {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: -1px;
        }

        .tree-score {
            font-weight: 800;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .winner .tree-score {
            background: rgba(34, 197, 94, 0.2);
        }

        .champion-banner {
            background: linear-gradient(135deg, rgba(234, 179, 8, 0.15) 0%, rgba(249, 115, 22, 0.15) 100%);
            border: 2px solid rgba(234, 179, 8, 0.4);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.1);
        }

        .champion-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fde047;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .champion-display {
            font-size: 1.75rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>

        // --- END ROBOT LIVE DATA ---

        function makeTeamRow(teamName, score, isWinner, isLoser) {
            const info = teamAssignments[teamName] || { employee: "Unassigned", flag: "🏳️" };
            let rowClass = "tree-team";
            if (isWinner) rowClass += " winner";
            if (isLoser) rowClass += " loser";

            return `
                <div class="${rowClass}">
                    <div style="display:flex; align-items: center; gap: 6px; overflow:hidden;">
                        ${getFlagHtml(teamName)}
                        <div style="display:flex; flex-direction:column;">
                            <span>${teamName || 'TBD'}</span>
                            <span class="tree-owner">${info.employee}</span>
                        </div>
                    </div>
                    <span class="tree-score">${score}</span>
                </div>
            `;
        }

        function renderBracketSection(containerId, matchArray) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';

            matchArray.forEach(m => {
                const homeFinishedWin = m.status === 'FINISHED' && m.homeScore > m.awayScore;
                const awayFinishedWin = m.status === 'FINISHED' && m.awayScore > m.homeScore;
                const homeFinishedLoss = m.status === 'FINISHED' && m.awayScore > m.homeScore;
                const awayFinishedLoss = m.status === 'FINISHED' && m.homeScore > m.awayScore;

                const cardClass = m.status === 'LIVE' ? 'tree-match live-border' : 'tree-match';

                container.innerHTML += `
                    <div class="${cardClass}">
                        ${makeTeamRow(m.home, m.homeScore, homeFinishedWin, homeFinishedLoss)}
                        ${makeTeamRow(m.away, m.awayScore, awayFinishedWin, awayFinishedLoss)}
                    </div>
                `;
            });

            if(matchArray.length === 0) {
                container.innerHTML = `<div class="tree-match" style="opacity:0.35; padding: 15px 5px; text-align:center; font-size:0.75rem;">🏳️ TBD vs TBD</div>`;
            }
        }

        function helperBuildMatchHtml(match) {
            const homeInfo = teamAssignments[match.home] || { employee: "Unassigned", flag: "🏳️" };
            const awayInfo = teamAssignments[match.away] || { employee: "Unassigned", flag: "🏳️" };
            
            let formattedDate = "";
            if (match.utcDate) {
                const d = new Date(match.utcDate);
                formattedDate = d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
            }
            
            return `
                <div class="match-card ${match.status.toLowerCase()}">
                    <div class="team-side">
                        <span class="flag">${getFlagHtml(match.home)}</span>
                        <span class="team-name">${match.home || 'TBD'}</span>
                        <span class="owner">👤 ${homeInfo.employee}</span>
                    </div>
                    <div class="center-score">
                        <div class="score-display">${match.homeScore} - ${match.awayScore}</div>
                        <span class="match-status">${match.status === 'LIVE' ? '🔴 LIVE' : match.time}</span>
                        ${formattedDate ? `<span class="match-date-badge">${formattedDate}</span>` : ''}
                    </div>
                    <div class="team-side">
                        <span class="flag">${getFlagHtml(match.away)}</span>
                        <span class="team-name">${match.away || 'TBD'}</span>
                        <span class="owner">👤 ${awayInfo.employee}</span>
                    </div>
                </div>
            `;
        }

        function renderApp() {
            const activeContainer = document.getElementById('active-matches-container');
            const pastContainer = document.getElementById('past-matches-container');
            const directoryContainer = document.getElementById('directory-container');
            
            activeContainer.innerHTML = '';
            pastContainer.innerHTML = '';
            directoryContainer.innerHTML = '';

            // --- SCAN AND INJECT DYNAMIC BROADCAST THEMING ---
            const liveMatch = matches.find(m => m.status === 'LIVE');
            if (liveMatch && teamColors[liveMatch.home] && teamColors[liveMatch.away]) {
                const colorA = teamColors[liveMatch.home][0];
                const colorB = teamColors[liveMatch.away][0];
                document.body.style.background = `linear-gradient(135deg, ${colorA}dd 0%, #0f172a 50%, ${colorB}dd 100%)`;
            } else {
                document.body.style.background = 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)';
            }

            const completedMatches = matches
                .filter(m => m.status === 'FINISHED')
                .sort((a, b) => new Date(b.utcDate || 0) - new Date(a.utcDate || 0));

            const upcomingAndLiveMatches = matches
                .filter(m => m.status !== 'FINISHED')
                .sort((a, b) => new Date(a.utcDate || 0) - new Date(b.utcDate || 0));

            upcomingAndLiveMatches.forEach(match => {
                activeContainer.innerHTML += helperBuildMatchHtml(match);
            });

            completedMatches.forEach(match => {
                pastContainer.innerHTML += helperBuildMatchHtml(match);
            });

            if (activeContainer.innerHTML === '') activeContainer.innerHTML = '<p style="text-align:center;color:gray;padding-top:15px;">No active matches.</p>';
            if (pastContainer.innerHTML === '') pastContainer.innerHTML = '<p style="text-align:center;color:gray;padding-top:15px;">No completed history.</p>';

            const sortedTeams = Object.keys(teamAssignments).map(k => ({ country: k, ...teamAssignments[k] })).sort((a,b) => a.employee.localeCompare(b.employee));
            sortedTeams.forEach(t => {
                directoryContainer.innerHTML += `
                    <div class="list-item">
                        <div class="directory-name">👤 ${t.employee}</div>
                        <span class="directory-country">${getFlagHtml(t.country)} <span>${t.country}</span></span>
                    </div>
                `;
            });

            const r32 = matches.filter(m => m.stage === 'LAST_32' || m.stage === 'ROUND_OF_32');
            const r16 = matches.filter(m => m.stage === 'LAST_16' || m.stage === 'ROUND_OF_16');
            const qf = matches.filter(m => m.stage === 'QUARTER_FINALS');
            const sf = matches.filter(m => m.stage === 'SEMI_FINALS');
            const finalMatch = matches.find(m => m.stage === 'FINAL');

            renderBracketSection('r32-box', r32);
            renderBracketSection('r16-box', r16);
            renderBracketSection('qf-box', qf);
            renderBracketSection('sf-box', sf);
            renderBracketSection('f-box', finalMatch ? [finalMatch] : []);

            if (finalMatch && finalMatch.status === 'FINISHED') {
                const champ = finalMatch.homeScore > finalMatch.awayScore ? finalMatch.home : finalMatch.away;
                const champInfo = teamAssignments[champ] || { employee: "Someone!", flag: "🏆" };
                document.getElementById('champion-banner').style.display = 'block';
                document.getElementById('champion-name-target').innerHTML = `${getFlagHtml(champ)} ${champ} (${champInfo.employee})`;
            }
        }

        renderApp();
    </script>
